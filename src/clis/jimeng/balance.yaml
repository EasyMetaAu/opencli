site: jimeng
name: balance
description: 即梦AI 查看积分余额与会员信息
domain: jimeng.jianying.com
strategy: cookie
browser: true

columns: [total, vip_credit, purchase_credit, gift_credit, vip_level, vip_expire]

pipeline:
  - navigate: https://jimeng.jianying.com/ai-tool/generate?type=image&workspace=0
  - evaluate: |
      (async () => {
        // 1. Wait for page to fully initialize (BDMS + React hydration)
        await new Promise(r => setTimeout(r, 5000));

        // 2. Verify login — check for credit display element
        const creditAmountEl = document.querySelector('[class*="credit-amount-container"],[class*="credit-amount-text"]');
        if (!creditAmountEl) {
          // No credit element visible — likely not logged in
          const loginCheck = await fetch('/mweb/v1/get_user_info', {
            method: 'POST', credentials: 'include',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({})
          }).then(r => r.json()).catch(() => null);
          if (!loginCheck || loginCheck.ret === '1014' || loginCheck.ret === 1014) {
            throw new Error('Not logged in — open jimeng.jianying.com in Chrome and sign in first');
          }
          throw new Error('Credit display not found — page structure may have changed');
        }

        // 3. Click credit element to open the detail dropdown panel
        const rect = creditAmountEl.getBoundingClientRect();
        creditAmountEl.dispatchEvent(new MouseEvent('click', {
          bubbles: true, cancelable: true,
          clientX: rect.left + rect.width / 2,
          clientY: rect.top + rect.height / 2
        }));
        await new Promise(r => setTimeout(r, 1500));

        // 4. Extract total from the detailed numeric display in the dropdown
        //    The panel shows "13932" in a credits-* element (not the formatted "1.4万")
        let total = '0';
        const creditNumEl = Array.from(document.querySelectorAll('[class*="credits-"],[class*="creditItem-"]'))
          .find(el => el.children.length === 0 && /^\d+$/.test(el.textContent?.trim() || ''));
        if (creditNumEl) {
          total = creditNumEl.textContent.trim();
        } else {
          // Fallback: parse formatted amount from header (e.g. "1.4万" → "14000")
          const headerAmountEl = document.querySelector('[class*="credit-amount-text"]');
          const raw = headerAmountEl?.textContent?.trim() || '0';
          if (raw.includes('万')) {
            total = String(Math.round(parseFloat(raw) * 10000));
          } else {
            total = raw.replace(/[^\d]/g, '') || '0';
          }
        }

        // 5. Extract VIP level from credit-container text (e.g. "1.4万高级会员" → "高级会员")
        const containerText = document.querySelector('[class*="credit-container"],[class*="credit-display-container"]')?.textContent?.trim() || '';
        const vipLevel = containerText.replace(/[\d万,.]+/g, '').trim() || 'free';

        // 6. Extract VIP expiry: scan all text nodes for date pattern near the dropdown
        let vipExpire = '';
        const walker = document.createTreeWalker(document.body, NodeFilter.SHOW_TEXT);
        let node;
        while ((node = walker.nextNode())) {
          const txt = node.textContent?.trim();
          // Match "2026.04.25 14:17" or "2026-04-25" style dates (not benefit descriptions)
          if (txt && /^\d{4}[.\-]\d{2}[.\-]\d{2}(\s\d{2}:\d{2})?$/.test(txt)) {
            vipExpire = txt;
            break;
          }
        }

        return [{
          total,
          vip_credit: '0',
          purchase_credit: '0',
          gift_credit: '0',
          vip_level: vipLevel,
          vip_expire: vipExpire,
        }];
      })()
  - map:
      total: ${{ item.total }}
      vip_credit: ${{ item.vip_credit }}
      purchase_credit: ${{ item.purchase_credit }}
      gift_credit: ${{ item.gift_credit }}
      vip_level: ${{ item.vip_level }}
      vip_expire: ${{ item.vip_expire }}
