site: jimeng
name: video
description: >-
  即梦AI 文生视频。
  用法: opencli jimeng video "描述" -f json |
  等待完成: opencli jimeng video "描述" --wait 300 -f json |
  指定模型时长: opencli jimeng video "描述" --model seedance_20 --duration 15 --ratio 9:16 -f json |
  建议先 opencli jimeng new 创建新会话，用返回的 workspace_id 传入 --workspace
domain: jimeng.jianying.com
strategy: cookie
browser: true

args:
  prompt:
    positional: true
    type: string
    required: true
    description: "视频描述 prompt"
  model:
    type: string
    default: "seedance_20_fast"
    description: "模型: seedance_20 (Seedance 2.0), seedance_20_fast (Seedance 2.0 Fast)"
  ratio:
    type: string
    default: "16:9"
    description: "宽高比: 16:9, 9:16, 1:1"
  duration:
    type: int
    default: 4
    description: "时长（秒）: 4, 10, 15"
  workspace:
    type: string
    default: "0"
    description: "workspace ID（默认 0）"
  wait:
    type: int
    default: 0
    description: "轮询等待秒数（默认 0 提交即返回，显式传值如 300 阻塞等结果）"

columns: [status, task_id, video_url, queue_position]

pipeline:
  - navigate: https://jimeng.jianying.com/ai-tool/generate?type=video&workspace=0
  - evaluate: |
      (async () => {
        const prompt = ${{ args.prompt | json }};
        const modelArg = ${{ args.model | json }};
        const ratio = ${{ args.ratio | json }};
        const duration = ${{ args.duration }};
        const waitSec = ${{ args.wait }};
        const workspaceId = parseInt(${{ args.workspace | json }}) || 0;

        // Model config: benefit_type, root_model, and model_req_key must all match
        const models = {
          'seedance_20': { benefit: 'dreamina_seedance_20', root: 'dreamina_seedance_20', reqKey: 'dreamina_seedance_20' },
          'seedance_20_fast': { benefit: 'dreamina_seedance_20_fast', root: 'dreamina_seedance_40', reqKey: 'dreamina_seedance_40' }
        };
        const modelCfg = models[modelArg] || models['seedance_20_fast'];
        const benefitType = modelCfg.benefit;

        const submitId = crypto.randomUUID();
        const draftId = crypto.randomUUID();
        const componentId = crypto.randomUUID();

        const body = {
          extend: {
            root_model: modelCfg.root,
            m_video_commerce_info: {
              benefit_type: benefitType,
              resource_id: 'generate_video',
              resource_id_type: 'str',
              resource_sub_type: 'aigc'
            },
            workspace_id: workspaceId,
            m_video_commerce_info_list: [{
              benefit_type: benefitType,
              resource_id: 'generate_video',
              resource_id_type: 'str',
              resource_sub_type: 'aigc'
            }]
          },
          submit_id: submitId,
          draft_content: JSON.stringify({
            type: 'draft', id: draftId,
            min_version: '3.0.5', min_features: [], is_from_tsn: true,
            version: '3.3.12', main_component_id: componentId,
            component_list: [{
              type: 'video_base_component', id: componentId,
              min_version: '1.0.0', aigc_mode: 'workbench',
              metadata: {
                type: '', id: crypto.randomUUID(),
                created_platform: 3, created_platform_version: '',
                created_time_in_ms: String(Date.now()), created_did: ''
              },
              generate_type: 'gen_video',
              abilities: {
                type: '', id: crypto.randomUUID(),
                gen_video: {
                  type: '', id: crypto.randomUUID(),
                  text_to_video_params: {
                    type: '', id: crypto.randomUUID(),
                    video_gen_inputs: [{
                      type: '', id: crypto.randomUUID(),
                      min_version: '3.0.5',
                      prompt: prompt,
                      video_mode: 2, fps: 24,
                      duration_ms: duration * 1000
                    }],
                    video_aspect_ratio: ratio,
                    seed: Math.floor(Math.random() * 4294967295),
                    model_req_key: modelCfg.reqKey,
                    priority: 0
                  }
                }
              },
              process_type: 1
            }]
          }),
          http_common_info: { aid: 513695 }
        };

        // Step 1: Submit generation task
        const submitResp = await fetch('/mweb/v1/aigc_draft/generate?aid=513695&device_platform=web&region=cn&da_version=3.3.12&os=mac&web_version=7.5.0', {
          method: 'POST', credentials: 'include',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        }).then(r => r.json());

        if (submitResp.ret === '1014' || submitResp.ret === 1014) {
          throw new Error('Not logged in — open jimeng.jianying.com in Chrome and sign in first');
        }
        if (submitResp.ret === '5001' || submitResp.ret === 5001) {
          throw new Error('Insufficient credits for this model/duration — try seedance_20_fast or shorter duration');
        }
        if (submitResp.ret !== '0' && submitResp.ret !== 0) {
          throw new Error('aigc_draft/generate failed: ret=' + submitResp.ret + ' errmsg=' + (submitResp.errmsg || ''));
        }

        const taskId = submitResp.data?.aigc_data?.history_record_id || submitResp.data?.aigc_data?.task?.task_id;
        if (!taskId) {
          throw new Error('No task_id in response: ' + JSON.stringify(submitResp).substring(0, 300));
        }

        // Step 2: If wait=0, return immediately with queued status
        if (waitSec <= 0) {
          const queueResp = await fetch('/mweb/v1/get_history_queue_info?aid=513695&web_version=7.5.0&da_version=3.3.12', {
            method: 'POST', credentials: 'include',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ history_ids: [taskId] })
          }).then(r => r.json()).catch(() => null);

          const queueInfo = queueResp?.data?.[taskId]?.queue_info;
          const queuePos = queueInfo ? String(queueInfo.queue_idx) + '/' + String(queueInfo.queue_length) : '';

          return [{ status: 'queued', task_id: taskId, video_url: '', queue_position: queuePos }];
        }

        // Step 3: Poll for completion
        const pollInterval = 10;
        const maxPolls = Math.ceil(waitSec / pollInterval);
        for (let i = 0; i < maxPolls; i++) {
          await new Promise(r => setTimeout(r, pollInterval * 1000));

          const queueResp = await fetch('/mweb/v1/get_history_queue_info?aid=513695&web_version=7.5.0&da_version=3.3.12', {
            method: 'POST', credentials: 'include',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ history_ids: [taskId] })
          }).then(r => r.json()).catch(() => null);

          // Network failure / empty response — retry silently
          if (!queueResp) continue;

          // Auth expired during poll — hard error, no point retrying
          if (queueResp.ret === '1014' || queueResp.ret === 1014) {
            throw new Error('Session expired during poll — re-login required, task_id=' + taskId);
          }

          // Other API error — hard error, don't mask as timeout
          if (queueResp.ret !== '0' && queueResp.ret !== 0) {
            throw new Error('get_history_queue_info failed: ret=' + queueResp.ret + ' errmsg=' + (queueResp.errmsg || '') + ', task_id=' + taskId);
          }

          const taskInfo = queueResp.data?.[taskId];

          if (taskInfo?.status === 50) {
            const resultResp = await fetch('/mweb/v1/get_history_by_ids?aid=513695&web_version=7.5.0&da_version=3.3.12', {
              method: 'POST', credentials: 'include',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ history_ids: [taskId] })
            }).then(r => r.json());

            if (resultResp.ret !== '0' && resultResp.ret !== 0) {
              throw new Error('get_history_by_ids failed: ret=' + resultResp.ret + ' errmsg=' + (resultResp.errmsg || '') + ', task_id=' + taskId);
            }

            const historyData = resultResp.data?.[taskId];
            const items = historyData?.item_list || [];
            const videoUrl = items[0]?.video_url || '';

            if (!videoUrl) {
              throw new Error('Generation completed but no video_url in response, task_id=' + taskId);
            }

            return [{ status: 'completed', task_id: taskId, video_url: videoUrl, queue_position: '' }];
          }

          if (taskInfo?.status === 30) {
            throw new Error('Video generation failed (status=30), task_id=' + taskId);
          }
        }

        return [{ status: 'timeout', task_id: taskId, video_url: '', queue_position: 'poll timeout after ' + waitSec + 's' }];
      })()
  - map:
      status: ${{ item.status }}
      task_id: ${{ item.task_id }}
      video_url: ${{ item.video_url }}
      queue_position: ${{ item.queue_position }}
