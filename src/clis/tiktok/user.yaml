site: tiktok
name: user
description: Get recent videos from a TikTok user
domain: www.tiktok.com

args:
  username:
    type: str
    required: true
    positional: true
    description: TikTok username (without @)
  limit:
    type: int
    default: 10
    description: Number of videos

pipeline:
  - navigate:
      url: https://www.tiktok.com/@${{ args.username }}
      settleMs: 6000

  - evaluate: |
      (async () => {
        const limit = ${{ args.limit }};
        const username = ${{ args.username | json }};
        const normalizedUsername = String(username).replace(/^@/, '').toLowerCase();

        const readUniversalData = () => {
          const script = document.querySelector('#__UNIVERSAL_DATA_FOR_REHYDRATION__');
          if (!script || !script.textContent) return null;
          try {
            return JSON.parse(script.textContent);
          } catch (err) {
            throw new Error('TikTok user universal data parse failed: ' + (err && err.message || err));
          }
        };

        const universalData = readUniversalData();
        const defaultScope = universalData && universalData.__DEFAULT_SCOPE__ || {};

        const readUserDetailFromUniversalData = () => {
          const detail = defaultScope['webapp.user-detail'];
          return detail && detail.userInfo && detail.userInfo.user || null;
        };

        const readCookie = (name) => {
          const prefix = name + '=';
          const part = document.cookie.split(';').map((cookie) => cookie.trim()).find((cookie) => cookie.startsWith(prefix));
          return part ? decodeURIComponent(part.slice(prefix.length)) : '';
        };

        const fetchJson = async (url, endpointName, fetcher = fetch) => {
          const res = await fetcher(url, { credentials: 'include' });
          if (!res.ok) {
            const err = new Error('TikTok user API failed: ' + endpointName + ' HTTP ' + res.status);
            err.status = res.status;
            err.endpointName = endpointName;
            throw err;
          }

          const text = await res.text();
          try {
            return JSON.parse(text);
          } catch (parseErr) {
            const err = new Error('TikTok user API failed: ' + endpointName + ' invalid JSON HTTP ' + res.status);
            err.status = res.status;
            err.endpointName = endpointName;
            err.cause = parseErr;
            throw err;
          }
        };

        const resolveSecUid = async () => {
          const universalUser = readUserDetailFromUniversalData();
          if (universalUser && universalUser.secUid) return universalUser.secUid;

          const detailUrl = '/api/user/detail/?uniqueId=' + encodeURIComponent(username) + '&aid=1988';
          const data = await fetchJson(detailUrl, 'user/detail');
          const apiUser = data && data.userInfo && data.userInfo.user;
          return apiUser && apiUser.secUid || '';
        };

        const isTargetItem = (item, secUid) => {
          const author = item && item.author || {};
          const authorName = String(author.uniqueId || '').toLowerCase();
          return authorName === normalizedUsername || Boolean(secUid && author.secUid === secUid);
        };

        const normalizeItem = (item) => {
          const author = item.author || {};
          const stats = item.stats || item.statsV2 || {};
          const authorName = author.uniqueId || username;
          return {
            id: item.id || '',
            url: item.id ? 'https://www.tiktok.com/@' + authorName + '/video/' + item.id : '',
            desc: (item.desc || '').replace(/\n/g, ' ').slice(0, 100),
            plays: Number(stats.playCount || stats.play_count || 0),
            likes: Number(stats.diggCount || stats.digg_count || 0),
            comments: Number(stats.commentCount || stats.comment_count || 0),
            shares: Number(stats.shareCount || stats.share_count || 0),
            createTime: Number(item.createTime || item.create_time || 0),
          };
        };

        const findInitialItems = (secUid) => {
          const seenObjects = new Set();
          const candidates = [];
          const visit = (value) => {
            if (!value || typeof value !== 'object' || seenObjects.has(value)) return;
            seenObjects.add(value);
            if (Array.isArray(value)) {
              const items = value.filter((item) => item && item.id && item.createTime && item.stats && isTargetItem(item, secUid));
              if (items.length > candidates.length) candidates.splice(0, candidates.length, ...items);
            }
            Object.keys(value).forEach((key) => visit(value[key]));
          };
          visit(defaultScope['webapp.post-list'] || defaultScope['webapp.video-list'] || defaultScope);
          return candidates;
        };

        const collectFromItemListApi = async (secUid) => {
          const results = [];
          let cursor = '0';
          const msToken = readCookie('msToken');
          for (let page = 0; page < 3 && results.length < limit; page += 1) {
            const count = Math.min(Math.max(limit - results.length, 1), 30);
            let url = '/api/post/item_list/?secUid=' + encodeURIComponent(secUid)
              + '&count=' + count
              + '&cursor=' + encodeURIComponent(cursor)
              + '&aid=1988';
            if (msToken) url += '&msToken=' + encodeURIComponent(msToken);

            const data = await fetchJson(url, 'post/item_list');
            if (!Array.isArray(data.itemList)) {
              const err = new Error('TikTok user API failed: post/item_list malformed itemList');
              err.endpointName = 'post/item_list';
              throw err;
            }
            results.push(...data.itemList.map(normalizeItem).filter((item) => item.id));

            const nextCursor = String(data.cursor || '');
            if (!data.hasMore || !nextCursor || nextCursor === cursor) break;
            cursor = nextCursor;
          }
          return results;
        };


        const secUid = await resolveSecUid();
        if (!secUid) throw new Error('Cannot resolve secUid for @' + username);

        const collectFromFallbacks = () => findInitialItems(secUid).map(normalizeItem).filter((item) => item.id);

        let videos;
        try {
          videos = await collectFromItemListApi(secUid);
        } catch (err) {
          if (!(err && err.endpointName === 'post/item_list')) throw err;
          videos = await collectFromFallbacks();
        }
        if (videos.length === 0) videos = await collectFromFallbacks();

        const deduped = [];
        const seenIds = new Set();
        for (const video of videos) {
          if (!video.id || seenIds.has(video.id)) continue;
          seenIds.add(video.id);
          deduped.push(video);
        }

        const results = deduped
          .sort((a, b) => b.createTime - a.createTime)
          .slice(0, limit)
          .map((video, idx) => ({ index: idx + 1, ...video }));

        if (results.length === 0) throw new Error('No videos found for @' + username);
        return results;
      })()

columns: [index, id, url, desc, plays, likes, comments, shares, createTime]
